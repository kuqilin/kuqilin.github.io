<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>广雅生存手册</title>
    <style>
        body, html { margin:0; padding:0; height:100%; }
        iframe { width:100%; height:100%; border:none; }
    </style>
</head>
<body>
    <script>
        // PDF 文件的直链（GitHub Release 永久链接）
        const pdfUrl = 'https://github.com/kuqilin/GY-guide/releases/download/latest/main.pdf';

        // 本地 PDF.js 查看器的路径（相对于当前 HTML 文件）
        const viewerPath = './pdfjs/web/viewer.html';

        // 拼接完整 URL，并对 PDF 链接进行编码
        const viewerUrl = viewerPath + '?file=' + encodeURIComponent(pdfUrl);

        // 动态生成 iframe
        document.write('<iframe src="' + viewerUrl + '"></iframe>');
    </script>
</body>
</html>
