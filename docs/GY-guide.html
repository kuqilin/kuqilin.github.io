<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>广雅生存手册 · 在线阅读</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #333;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <script>
        (function() {
            // PDF 文件的原始链接（GitHub Release 永久链接）
            const pdfUrl = 'https://github.com/kuqilin/GY-guide/releases/download/latest/main.pdf';

            // 本地 PDF.js 查看器的路径（请根据你的实际目录调整）
            const viewerPath = '../pdfjs/web/viewer.html';

            // 拼接完整的查看器 URL，并传递 PDF 文件参数
            // 注意：PDF.js 会自动处理跨域和下载头问题
            const fullViewerUrl = viewerPath + '?file=' + encodeURIComponent(pdfUrl);

            // 写入 iframe
            document.write('<iframe src="' + fullViewerUrl + '" allowfullscreen webkitallowfullscreen></iframe>');
        })();
    </script>
    <!-- 备用下载链接（极低概率 iframe 加载失败时显示） -->
    <noscript>
        <div style="color: white; padding: 20px; text-align: center;">
            您的浏览器不支持 JavaScript，请<a href="https://github.com/kuqilin/GY-guide/releases/download/latest/main.pdf" style="color: #8cb4ff;">直接下载 PDF</a>。
        </div>
    </noscript>
</body>
</html>
